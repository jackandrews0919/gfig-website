<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login — GFIG Virtual</title>
  <meta name="description" content="Sign in to the GFIG Member Portal to access missions, NOTAMs, and flight reports.">
  <meta property="og:title" content="GFIG Member Portal">
  <meta property="og:description" content="Sign in to access the Global Flight Inspection Group virtual operations network.">
  <meta property="og:image" content="logo.png">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <style>
    body { overflow: hidden; }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      position: relative;
    }

    .login-grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,119,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,119,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .login-glow {
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(255,106,0,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
    }

    .login-logo {
      height: 64px;
      width: auto;
      margin-bottom: 12px;
    }

    .login-org-tag {
      font-family: var(--font-head);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--orange);
      background: rgba(255,106,0,0.08);
      border: 1px solid rgba(255,106,0,0.2);
      padding: 4px 12px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 20px;
    }

    .login-title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .login-sub {
      color: var(--text-sub);
      font-size: 0.84rem;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .btn-discord {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      background: #5865F2;
      color: #fff;
      font-weight: 600;
      font-size: 0.92rem;
      border-radius: var(--r-md);
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background var(--t), transform var(--t), box-shadow var(--t);
      margin-bottom: 12px;
    }
    .btn-discord:hover {
      background: #4752C4;
      box-shadow: 0 4px 24px rgba(88,101,242,0.35);
      transform: translateY(-1px);
    }
    .btn-discord svg { flex-shrink: 0; }

    .login-back {
      position: absolute;
      top: 20px; left: 24px;
      font-size: 0.8rem;
      color: var(--text-sub);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 2;
      transition: color var(--t);
    }
    .login-back:hover { color: var(--text); }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 28px; margin: 16px; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="login-back">← Back to Home</a>

  <div class="login-page">
    <div class="login-grid-bg"></div>
    <div class="login-glow"></div>

    <div class="login-card">
      <img src="logo.png" alt="GFIG" class="login-logo">
      <div class="login-org-tag">MEMBER PORTAL</div>
      <div class="login-title">OPERATIONS ACCESS</div>
      <div class="login-sub">Sign in with your GFIG account to access missions, NOTAMs, and flight reports.</div>

      <!-- ── Real Email/Password Login ── -->
      <div id="login-form-wrap">
        <div class="form-group" style="text-align:left; margin-bottom:14px;">
          <label style="display:block; font-family:var(--font-head); font-size:0.65rem; letter-spacing:0.12em; color:var(--text-sub); margin-bottom:6px;">EMAIL ADDRESS</label>
          <input type="email" id="login-email" autocomplete="email"
            style="width:100%; padding:11px 14px; background:rgba(11,31,58,0.9); border:1px solid var(--border); border-radius:var(--r-md); color:var(--text); font-size:0.88rem; font-family:var(--font-body); box-sizing:border-box; transition:border-color 0.2s;"
            placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="form-group" style="text-align:left; margin-bottom:20px;">
          <label style="display:block; font-family:var(--font-head); font-size:0.65rem; letter-spacing:0.12em; color:var(--text-sub); margin-bottom:6px;">PASSWORD</label>
          <input type="password" id="login-password" autocomplete="current-password"
            style="width:100%; padding:11px 14px; background:rgba(11,31,58,0.9); border:1px solid var(--border); border-radius:var(--r-md); color:var(--text); font-size:0.88rem; font-family:var(--font-body); box-sizing:border-box; transition:border-color 0.2s;"
            placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()">
          <div style="text-align:right; margin-top:6px;">
            <a href="#" onclick="doResetPassword(); return false;" style="font-size:0.75rem; color:var(--text-muted); text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='var(--blue)'" onmouseout="this.style.color='var(--text-muted)'">Forgot password?</a>
          </div>
        </div>
        <div id="login-error" style="display:none; background:var(--fail-bg); border:1px solid var(--fail-border); color:var(--fail); border-radius:var(--r-md); padding:10px 14px; font-size:0.82rem; margin-bottom:14px; text-align:left;"></div>
        <button id="login-btn" onclick="doLogin()" class="btn-discord" style="margin-bottom:10px;">
          Sign In to GFIG Portal
        </button>
      </div>

      <!-- ── Not a member ── -->
      <div style="display:flex; gap:10px; margin-bottom:16px;">
        <a href="https://discord.gg/pyMHMCzApW" target="_blank" rel="noopener" class="btn-discord"
          style="flex:1; background:#5865F2; font-size:0.82rem; padding:10px 12px; margin:0;">
          <svg width="16" height="11" viewBox="0 0 71 55" fill="white"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.5.7a40.5 40.5 0 0 0-1.8 3.7 54.1 54.1 0 0 0-16.4 0A37.9 37.9 0 0 0 25.5.7 58.4 58.4 0 0 0 10.9 5C1.6 19.4-1 33.3.3 47.1a59 59 0 0 0 18 9.1 44.3 44.3 0 0 0 3.8-6.2 38.4 38.4 0 0 1-6.1-2.9l1.5-1.1a42.2 42.2 0 0 0 36 0l1.5 1.1a38.7 38.7 0 0 1-6.1 3 43.6 43.6 0 0 0 3.8 6.2 58.8 58.8 0 0 0 18-9.2c1.5-15.8-2.6-29.5-10.6-42.1Z"/></svg>
          Discord
        </a>
        <a href="join.html" class="btn-discord"
          style="flex:1; background:var(--orange); font-size:0.82rem; padding:10px 12px; margin:0;">
          ✈ Apply
        </a>
      </div>


    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    /* If already logged in, redirect immediately */
    (function () {
      if (window.GFIG_FIREBASE_READY && window.auth) {
        window.auth.onAuthStateChanged(user => {
          if (user) {
            const params = new URLSearchParams(location.search);
            const dest = params.get('redirect');
            window.location.href = (dest && /^[\w-]+\.html$/.test(dest)) ? dest : 'dashboard.html';
          }
        });
      } else {
        /* localStorage demo mode */
        const session = JSON.parse(localStorage.getItem('gfig_session') || 'null');
        if (session) {
          const params = new URLSearchParams(location.search);
          const dest = params.get('redirect');
          window.location.href = (dest && /^[\w-]+\.html$/.test(dest)) ? dest : 'dashboard.html';
        }
      }
    })();

    async function doResetPassword() {
      const email = (document.getElementById('login-email').value || '').trim();
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      if (!email) {
        errEl.textContent = 'Enter your email address above, then click Forgot password.';
        errEl.style.display = 'block';
        return;
      }
      if (!window.GFIG_FIREBASE_READY) {
        errEl.textContent = 'Service unavailable. Please try again later.';
        errEl.style.display = 'block';
        return;
      }
      try {
        await window.auth.sendPasswordResetEmail(email);
        errEl.style.background = 'rgba(0,230,118,0.08)';
        errEl.style.borderColor = 'rgba(0,230,118,0.3)';
        errEl.style.color = 'var(--pass)';
        errEl.textContent = 'Password reset email sent! Check your inbox (and spam folder).';
        errEl.style.display = 'block';
      } catch(e) {
        const msg = {
          'auth/user-not-found': 'No account found with that email.',
          'auth/invalid-email':  'Please enter a valid email address.'
        }[e.code] || 'Could not send reset email. Please try again.';
        errEl.style.background = '';
        errEl.style.borderColor = '';
        errEl.style.color = '';
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    }

    async function doLogin() {
      const emailEl = document.getElementById('login-email');
      const passEl  = document.getElementById('login-password');
      const errEl   = document.getElementById('login-error');
      const btn     = document.getElementById('login-btn');
      const email    = (emailEl.value || '').trim();
      const password =  passEl.value || '';

      errEl.style.display = 'none';
      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
      }
      if (!window.GFIG_FIREBASE_READY) {
        errEl.textContent = 'Login service is not available. Please try again later.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Signing in…';
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.7';

      try {
        await gfigAuth.loginWithEmail(email, password);
        const params = new URLSearchParams(location.search);
        const dest = params.get('redirect');
        window.location.href = (dest && /^[\w-]+\.html$/.test(dest)) ? dest : 'dashboard.html';
      } catch (e) {
        const msg = {
          'auth/user-not-found':     'No account found with that email.',
          'auth/wrong-password':     'Incorrect password.',
          'auth/invalid-email':      'Please enter a valid email address.',
          'auth/too-many-requests':  'Too many attempts. Please wait and try again.',
          'auth/user-disabled':      'This account has been suspended. Contact an admin.'
        }[e.code] || 'Sign-in failed. Please try again.';
        errEl.textContent = msg;
        errEl.style.display = 'block';
        btn.textContent = 'Sign In to GFIG Portal';
        btn.style.pointerEvents = '';
        btn.style.opacity = '';
      }
    }
  </script>
</body>
</html>
